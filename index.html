<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TRAVEL LOG · 나의 여행 기록</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="icon_뱅기01_32.png">
<link rel="apple-touch-icon" href="icon_뱅기01_180.png">
<meta name="theme-color" content="#1B2A4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TRAVEL LOG">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
/* ============ TOKENS ============ */
:root{
  --bg:#FAF6EF;
  --bg-deep:#F2ECDD;
  --surface:#FFFFFF;
  --surface-soft:#FFFDF8;
  --ink:#1B2A4A;
  --ink-soft:#5B6B85;
  --ink-faint:#93A0B5;
  --line:#E7DFCE;
  --gold:#C9A227;
  --stamp:#B5483D;
  --stamp-soft:rgba(181,72,61,.16);
  --stamp-soft-2:rgba(181,72,61,.28);
  --radius-lg:22px;
  --radius-md:16px;
  --radius-sm:10px;
  --shadow-sm:0 2px 10px rgba(27,42,74,.06);
  --shadow-md:0 10px 30px rgba(27,42,74,.10);
  --font-display:'Fraunces',serif;
  --font-body:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'Space Mono',monospace;
  --tabbar-h:64px;
  --topbar-h:88px;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
body{overscroll-behavior-y:none;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
h1,h2,h3{font-family:var(--font-display);margin:0;letter-spacing:.2px;}
a{color:inherit;}

/* ============ APP SHELL ============ */
#app{position:fixed;inset:0;display:flex;flex-direction:column;}

.topbar{
  height:var(--topbar-h);
  background:linear-gradient(180deg,var(--ink) 0%,#233857 100%);
  color:#F4EFE2;
  flex:0 0 auto;
  display:flex;align-items:center;
  padding:0 18px;
  position:relative;
  overflow:hidden;
}
.topbar::after{
  content:"";position:absolute;inset:0;
  background-image:radial-gradient(circle at 90% 20%, rgba(255,255,255,.07) 0, transparent 45%),
                    radial-gradient(circle at 15% 90%, rgba(255,255,255,.05) 0, transparent 40%);
}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;width:100%;position:relative;z-index:1;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{
  width:42px;height:42px;border-radius:50%;
  border:1.5px dashed rgba(244,239,226,.55);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;transform:rotate(-8deg);
  flex:0 0 auto;
}
.brand h1{font-size:19px;font-weight:600;letter-spacing:1.5px;}
.brand-sub{margin:2px 0 0;font-size:11.5px;color:#C9C2AC;letter-spacing:.3px;}
.topbar-stat{text-align:right;font-family:var(--font-mono);}
.topbar-stat span{font-size:22px;font-weight:700;color:var(--gold);}
.topbar-stat small{display:block;font-size:10px;color:#C9C2AC;letter-spacing:1px;margin-top:-2px;}

.view-area{flex:1 1 auto;position:relative;overflow:hidden;}
.view{position:absolute;inset:0;display:none;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.view.active{display:block;}

.tabbar{
  flex:0 0 auto;height:var(--tabbar-h);
  background:var(--surface);
  border-top:1px solid var(--line);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom);
}
.tab-btn{
  flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--ink-faint);font-size:11px;font-weight:600;letter-spacing:.2px;
  transition:color .15s;
}
.tab-btn span{font-size:18px;}
.tab-btn.active{color:var(--stamp);}

.fab{
  position:absolute;right:18px;bottom:calc(var(--tabbar-h) + 18px + env(safe-area-inset-bottom));
  width:54px;height:54px;border-radius:50%;
  background:var(--stamp);color:#fff;border:none;
  font-size:26px;font-weight:300;
  box-shadow:var(--shadow-md);
  display:flex;align-items:center;justify-content:center;
  z-index:50;
  transition:transform .15s;
}
.fab:active{transform:scale(.92);}

/* ============ DESKTOP / TABLET LAYOUT ============ */
@media (min-width:768px){
  #app{flex-direction:row;}
  .topbar{
    position:fixed;top:0;left:0;right:0;height:64px;z-index:30;
  }
  .view-area{margin-top:64px;height:calc(100% - 64px);width:100%;}
  .tabbar{
    position:fixed;left:0;top:64px;bottom:0;width:92px;height:auto;
    flex-direction:column;border-top:none;border-right:1px solid var(--line);
    padding-top:14px;padding-bottom:0;
  }
  .tab-btn{flex:0 0 auto;padding:16px 0;}
  .view-area{margin-left:92px;width:calc(100% - 92px);}
  .fab{right:34px;bottom:34px;}
}

/* ============ STAMP BADGE (signature element) ============ */
.stamp{
  border-radius:50%;border:2px dashed var(--stamp);
  color:var(--stamp);display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-weight:700;
  background:var(--stamp-soft);
  transform:rotate(-7deg);
  text-align:center;line-height:1.1;
}

/* ============ MAP VIEW ============ */
#view-map{padding:0;}
#map{position:absolute;inset:0;background:#EFE9DA;z-index:1;}
.leaflet-container{font-family:var(--font-body);background:#EFE9DA;}
.map-legend{
  position:absolute;top:14px;left:14px;z-index:20;
  background:rgba(255,253,248,.92);backdrop-filter:blur(6px);
  border:1px solid var(--line);border-radius:999px;
  padding:8px 16px;font-size:12.5px;color:var(--ink-soft);
  box-shadow:var(--shadow-sm);
}
.map-legend strong{color:var(--stamp);font-family:var(--font-mono);font-size:13.5px;}

.plane-icon{
  width:30px;height:30px;border-radius:50%;
  background:var(--surface);border:2px solid var(--stamp);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;box-shadow:var(--shadow-sm);
  cursor:pointer;pointer-events:auto;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
}
.plane-icon span{display:block;transform:rotate(-15deg);pointer-events:none;}
.leaflet-marker-icon{user-select:none;-webkit-user-select:none;}

.trip-panel{
  position:absolute;left:0;right:0;bottom:0;
  max-height:78%;background:var(--bg);
  border-radius:22px 22px 0 0;
  box-shadow:0 -10px 30px rgba(27,42,74,.18);
  transform:translateY(105%);transition:transform .28s ease;
  z-index:40;overflow-y:auto;padding:10px 18px 28px;
}
.trip-panel.open{transform:translateY(0);}
.panel-handle{width:40px;height:4px;background:var(--line);border-radius:4px;margin:6px auto 14px;}
.panel-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;color:var(--ink-faint);}

@media (min-width:768px){
  .trip-panel{
    left:auto;right:0;top:0;bottom:0;width:380px;max-height:none;
    border-radius:0;transform:translateX(105%);
    box-shadow:-10px 0 30px rgba(27,42,74,.12);
    padding:20px 22px 28px;
  }
  .trip-panel.open{transform:translateX(0);}
  .panel-handle{display:none;}
}

/* ============ TIMELINE VIEW ============ */
.page-pad{padding:18px;max-width:760px;margin:0 auto;}
.empty-state{
  text-align:center;padding:60px 24px;color:var(--ink-faint);
}
.empty-state .stamp{width:64px;height:64px;font-size:22px;margin:0 auto 16px;}
.empty-state h3{color:var(--ink-soft);font-size:16px;margin-bottom:6px;}
.empty-state p{font-size:13px;margin:0;}

.year-heading{
  display:flex;align-items:baseline;gap:10px;margin:28px 0 14px;
}
.year-heading:first-child{margin-top:4px;}
.year-heading .num{font-family:var(--font-display);font-size:34px;font-weight:600;color:var(--ink);}
.year-heading .cnt{font-size:12px;color:var(--ink-faint);font-family:var(--font-mono);}
.year-heading::after{content:"";flex:1;height:1px;background:var(--line);}

.trip-card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);
  padding:14px;display:flex;gap:12px;margin-bottom:10px;box-shadow:var(--shadow-sm);
  transition:transform .12s;
}
.trip-card:active{transform:scale(.985);}
.trip-thumb{
  width:54px;height:54px;border-radius:14px;flex:0 0 auto;
  background:var(--stamp-soft);display:flex;align-items:center;justify-content:center;
  overflow:hidden;font-size:22px;
}
.trip-thumb img{width:100%;height:100%;object-fit:cover;}
.trip-info{flex:1;min-width:0;}
.trip-info .place{font-weight:700;font-size:15px;}
.trip-info .place small{font-weight:500;color:var(--ink-faint);font-size:12px;}
.trip-info .dates{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
.trip-info .meta-row{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;}
.tag{
  font-size:10.5px;padding:2px 8px;border-radius:999px;background:var(--bg-deep);color:var(--ink-soft);
  font-weight:600;
}
.stars{color:var(--gold);font-size:12px;letter-spacing:1px;}

/* ============ STATS VIEW ============ */
.hero-stat{
  background:linear-gradient(135deg,var(--ink) 0%,#2C4368 100%);
  color:#F4EFE2;border-radius:var(--radius-lg);padding:26px 22px;
  display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;
  position:relative;overflow:hidden;
}
.hero-stat::after{content:"✈";position:absolute;right:-10px;bottom:-22px;font-size:110px;opacity:.07;transform:rotate(-15deg);}
.hero-stat .big{font-family:var(--font-display);font-size:48px;font-weight:700;line-height:1;}
.hero-stat .lbl{font-size:12px;color:#C9C2AC;letter-spacing:1px;margin-top:6px;}
.hero-stat .stamp{width:60px;height:60px;font-size:11px;border-color:var(--gold);color:var(--gold);background:rgba(201,162,39,.12);}

.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;}
.stat-box{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);
  padding:16px;box-shadow:var(--shadow-sm);
}
.stat-box .val{font-family:var(--font-mono);font-size:24px;font-weight:700;color:var(--stamp);}
.stat-box .lbl{font-size:11.5px;color:var(--ink-soft);margin-top:4px;}

.chart-card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);
  padding:18px;margin-bottom:16px;box-shadow:var(--shadow-sm);
}
.chart-card h3{font-size:14px;font-family:var(--font-body);font-weight:700;margin-bottom:12px;color:var(--ink-soft);letter-spacing:.3px;}
.chart-card canvas{max-height:220px;}

/* ============ FLIGHTS VIEW ============ */
.flights-toolbar{padding:16px 18px 0;max-width:760px;margin:0 auto;}
.flights-toolbar input{
  width:100%;padding:11px 16px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface);font-size:13.5px;color:var(--ink);
}
.flights-toolbar input::placeholder{color:var(--ink-faint);}

.bp-wrap{background:var(--bg);padding:14px 0 16px;display:flex;flex-wrap:wrap;align-items:flex-start;gap:16px;justify-content:center;}
.boarding-pass{
  --ac:#1B2A4A;--ac2:#2C4368;
  width:280px;background:var(--surface);border-radius:var(--radius-md);overflow:hidden;
  box-shadow:var(--shadow-sm);position:relative;border:1px solid var(--line);
}
.bp-top{
  background:linear-gradient(120deg,var(--ac) 0%,var(--ac2) 100%);
  color:#fff;padding:12px 16px;text-align:center;
}
.bp-top .bp-tag{font-size:11px;letter-spacing:2.5px;font-weight:700;font-family:var(--font-mono);}
.bp-body{padding:16px 16px 10px;font-family:var(--font-mono);}
.bp-row{display:flex;gap:10px;padding:5px 0;font-size:12px;align-items:baseline;}
.bp-row label{width:46px;flex:0 0 auto;color:var(--ink-faint);font-size:9.5px;letter-spacing:1px;}
.bp-row span{color:var(--ink);font-weight:700;font-size:13px;letter-spacing:1.5px;word-break:break-word;}
.bp-seatbox{
  margin:6px 16px 0;background:var(--seatbg,var(--stamp-soft));border:1.5px solid var(--seatborder,var(--stamp));border-radius:999px;
  display:flex;flex-wrap:nowrap;align-items:baseline;justify-content:center;gap:8px;padding:9px 14px;
  min-height:42px;
}
.bp-pill-divider{display:inline-block;width:1px;height:16px;background:var(--seatborder,var(--stamp));opacity:.35;transform:translateY(2px);flex:0 0 auto;}
.bp-seg-lbl{font-size:8.5px;letter-spacing:1.5px;color:var(--seatborder,var(--stamp));font-weight:700;font-family:var(--font-mono);white-space:nowrap;}
.bp-seat-val{font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--seatborder,var(--stamp));white-space:nowrap;min-width:0.6em;display:inline-block;}
.bp-flight-val{font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--seatborder,var(--stamp));letter-spacing:.3px;white-space:nowrap;}
.bp-divider{
  position:relative;height:1px;margin:50px 16px 0;
  background-image:linear-gradient(90deg,var(--line) 60%,transparent 0%);
  background-size:10px 1px;background-repeat:repeat-x;
}
.bp-divider::before,.bp-divider::after{
  content:"";position:absolute;top:-7px;width:14px;height:14px;border-radius:50%;background:var(--bg);
}
.bp-divider::before{left:-7px;}
.bp-divider::after{right:-7px;}
.bp-foot{padding:10px 16px 4px;min-height:26px;}
.bp-tkno{font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);letter-spacing:.3px;}
.bp-brand-strip{display:flex;align-items:center;gap:8px;padding:10px 16px 16px;}
.bp-monogram{
  width:24px;height:24px;border-radius:50%;background:var(--ac);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:0 0 auto;
}
.bp-brand-word{font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--ac);letter-spacing:.3px;}

/* ---- segmented date / time inputs ---- */
.date-input,.time-input{display:flex;align-items:center;gap:4px;}
.date-input input,.time-input input{
  text-align:center;font-family:var(--font-mono);font-weight:700;letter-spacing:1px;
  padding:11px 0;min-width:0;
}
.date-input .di-y{flex:1.5;}
.date-input .di-m,.date-input .di-d{flex:1;}
.time-input .ti-h,.time-input .ti-m{flex:1;}
.date-input span,.time-input span{color:var(--ink-faint);font-family:var(--font-mono);font-weight:700;flex:0 0 auto;}
.dt-combo{display:flex;gap:8px;align-items:center;}
.dt-combo .date-input{flex:1.7;}
.dt-combo .time-input{flex:1;}

/* ============ MODAL / FORM ============ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(27,42,74,.45);z-index:100;
  display:none;align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--bg);width:100%;max-width:560px;max-height:92vh;
  border-radius:22px 22px 0 0;overflow-y:auto;padding:0 0 30px;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(40px);opacity:.5;}to{transform:translateY(0);opacity:1;}}
@media (min-width:768px){
  .modal-overlay{align-items:center;}
  .modal{border-radius:var(--radius-lg);max-height:88vh;}
}
.modal-head{
  position:sticky;top:0;background:var(--bg);padding:18px 20px 12px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--line);z-index:5;
}
.modal-head h2{font-size:18px;}
.modal-head button{background:none;border:none;font-size:20px;color:var(--ink-faint);}
.modal-body{padding:18px 20px;}

.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.2px;}
.field input,.field select,.field textarea{
  width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:var(--radius-sm);
  background:var(--surface);font-size:14px;color:var(--ink);
}
.field textarea{resize:vertical;min-height:64px;}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.hint{font-size:11px;color:var(--ink-faint);margin-top:4px;}

.rating-input{display:flex;gap:6px;font-size:24px;}
.rating-input button{background:none;border:none;color:var(--line);padding:0;}
.rating-input button.on{color:var(--gold);}

.section-title{
  font-size:13px;font-weight:700;color:var(--ink);margin:22px 0 10px;display:flex;align-items:center;gap:8px;
}
.section-title::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--stamp);}

.flight-block{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);
  padding:14px;margin-bottom:12px;position:relative;
}
.flight-block .rm-btn{
  position:absolute;top:10px;right:10px;background:none;border:none;color:var(--ink-faint);font-size:16px;
}
.add-flight-btn{
  width:100%;padding:12px;border:1.5px dashed var(--line);border-radius:var(--radius-sm);
  background:none;color:var(--ink-soft);font-size:13px;font-weight:600;
}

.btn-primary{
  width:100%;padding:14px;border-radius:999px;border:none;background:var(--stamp);color:#fff;
  font-size:15px;font-weight:700;margin-top:8px;box-shadow:var(--shadow-sm);
}
.btn-ghost{
  width:100%;padding:13px;border-radius:999px;border:1px solid var(--line);background:none;color:var(--ink-soft);
  font-size:13.5px;font-weight:600;margin-top:8px;
}
.photo-preview{
  width:100%;height:140px;border-radius:var(--radius-md);background:var(--bg-deep);
  display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:13px;
  overflow:hidden;margin-bottom:8px;border:1px solid var(--line);
}
.photo-preview img{width:100%;height:100%;object-fit:cover;}

/* trip panel detail content reuses some of the above */
.panel-title{font-size:20px;margin-bottom:2px;}
.panel-sub{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);margin-bottom:14px;}
.panel-actions{display:flex;gap:8px;margin-top:18px;}
.panel-actions button{flex:1;padding:11px;border-radius:999px;font-size:13px;font-weight:700;}
.btn-edit{border:1px solid var(--line);background:var(--surface);color:var(--ink);}
.btn-delete{border:none;background:rgba(181,72,61,.1);color:var(--stamp);}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;}
.detail-row label{color:var(--ink-faint);}
.detail-row span{font-weight:600;text-align:right;}
.memo-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px;font-size:13px;color:var(--ink-soft);margin-top:10px;line-height:1.5;}

/* ============ SYNC (JSONBin) ============ */
.gear-btn{
  width:34px;height:34px;border-radius:50%;border:1px solid rgba(244,239,226,.35);
  background:rgba(255,255,255,.06);color:#F4EFE2;font-size:15px;
  display:flex;align-items:center;justify-content:center;margin-right:10px;flex:0 0 auto;
}
.sync-status{
  display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-soft);
  margin-bottom:14px;padding:10px 12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);
}
.sync-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
.sync-dot.on{background:#3A8F5A;}
.sync-dot.off{background:var(--ink-faint);}
.sync-help{font-size:11.5px;color:var(--ink-faint);margin:-2px 0 14px;line-height:1.55;}
.sync-help a{color:var(--stamp);font-weight:600;}
</style>
</head>
<body>

<div id="app">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">✈</div>
        <div>
          <h1>TRAVEL LOG</h1>
          <p class="brand-sub">나의 여행 기록</p>
        </div>
      </div>
      <div style="display:flex;align-items:center;">

==================================================================== */
const STORE_KEY="travelLogData_v1";
function loadData(){
  try{const raw=localStorage.getItem(STORE_KEY);return raw?JSON.parse(raw):{trips:[]};}
  catch(e){return {trips:[]};}
}
function saveData(){localStorage.setItem(STORE_KEY,JSON.stringify(state));}
let state=loadData();

function countryInfo(code){return COUNTRIES.find(c=>c.code===code);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

/* ====================================================================
   TAB NAVIGATION
==================================================================== */
const views=document.querySelectorAll(".view");
const tabBtns=document.querySelectorAll(".tab-btn");
let charts={};
tabBtns.forEach(btn=>{
  btn.addEventListener("click",()=>{
    tabBtns.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    views.forEach(v=>v.classList.remove("active"));
    document.getElementById("view-"+btn.dataset.tab).classList.add("active");
    if(btn.dataset.tab==="timeline")renderTimeline();
    if(btn.dataset.tab==="stats")renderStats();
    if(btn.dataset.tab==="flights")renderFlights();
    if(btn.dataset.tab==="map" && map)setTimeout(()=>map.invalidateSize(),50);
  });
});

/* ====================================================================
   MAP
==================================================================== */
let map,geoLayer,markersLayer;
function initMap(){
  map=L.map("map",{zoomControl:true,attributionControl:false,minZoom:2,maxBounds:[[-85,-180],[85,180]],maxBoundsViscosity:1.0}).setView([20,20],2);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{maxZoom:18,noWrap:true}).addTo(map);
  markersLayer=L.layerGroup().addTo(map);
  fetch("https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json")
    .then(r=>r.json())
    .then(geo=>{
      geoLayer=L.geoJSON(geo,{style:styleCountry}).addTo(map);
      geoLayer.bringToBack();
    })
    .catch(()=>{});
}
function visitedCodes(){return [...new Set(state.trips.map(t=>t.countryCode))];}
function styleCountry(feature){
  const visited=visitedCodes().includes(feature.id);
  return {
    fillColor:visited?"#B5483D":"#FFFFFF",
    fillOpacity:visited?0.45:0.4,
    color:visited?"#B5483D":"#D8D0BD",
    weight:visited?1.4:0.6,
  };
}
function refreshMapStyle(){if(geoLayer)geoLayer.setStyle(styleCountry);}

function renderMarkers(){
  markersLayer.clearLayers();
  state.trips.forEach(trip=>{
    const ci=countryInfo(trip.countryCode);
    const lat=trip.lat!=null?trip.lat:(ci?ci.lat:0);
    const lng=trip.lng!=null?trip.lng:(ci?ci.lng:0);
    const icon=L.divIcon({className:"",html:'<div class="plane-icon"><span>✈️</span></div>',iconSize:[30,30],iconAnchor:[15,15]});
    const marker=L.marker([lat,lng],{icon}).addTo(markersLayer);
    marker.on("click",()=>openTripPanel(trip.id));
  });
}

function updateCounters(){
  const codes=visitedCodes();
  document.getElementById("topCountryCount").textContent=codes.length;
  document.getElementById("mapCountryCount").textContent=codes.length;
  document.getElementById("mapCityCount").textContent=new Set(state.trips.map(t=>t.city||t.countryCode)).size;
}

function refreshAll(){
  saveData();
  updateCounters();
  refreshMapStyle();
  renderMarkers();
  autoPushSync();
}

/* ---- trip detail panel ---- */
const tripPanel=document.getElementById("tripPanel");
function openTripPanel(tripId){
  const trip=state.trips.find(t=>t.id===tripId);
  if(!trip)return;
  const ci=countryInfo(trip.countryCode);
  let html=`<h3 class="panel-title">${ci?ci.ko:trip.countryCode}${trip.city?" · "+trip.city:""}</h3>
  <div class="panel-sub">${fmtRange(trip.start,trip.end)}</div>`;
  html+=detailRows(trip);
  if(trip.memo)html+=`<div class="memo-box">${escapeHtml(trip.memo)}</div>`;
  if(trip.photo)html+=`<div class="photo-preview" style="margin-top:12px;height:160px;"><img src="${trip.photo}"></div>`;
  (trip.flights||[]).forEach(f=>{html+=`<div style="margin-top:14px;display:flex;justify-content:center;">${boardingPassHTML(f,trip)}</div>`;});
  html+=`<div class="panel-actions">
    <button class="btn-edit" onclick="editTrip('${trip.id}')">수정</button>
    <button class="btn-delete" onclick="deleteTrip('${trip.id}')">삭제</button>
  </div>`;
  document.getElementById("panelContent").innerHTML=html;
  tripPanel.classList.add("open");
}
function detailRows(trip){
  let rows="";
  if(trip.companion)rows+=row("동행",trip.companion);
  rows+=row("목적",trip.purpose||"여행");
  if(trip.rating)rows+=row("만족도","★".repeat(trip.rating)+"☆".repeat(5-trip.rating));
  return rows?`<div style="margin-top:10px;">${rows}</div>`:"";
}
function row(l,v){return `<div class="detail-row"><label>${l}</label><span>${escapeHtml(String(v))}</span></div>`;}
document.getElementById("panelCloseBtn").addEventListener("click",()=>tripPanel.classList.remove("open"));

function boardingPassHTML(f,trip){
  const brand=AIRLINES[f.airline]||DEFAULT_AIRLINE;

function renderTimeline(){

==================================================================== */
function renderStats(){
  const el=document.getElementById("statsContent");
  if(state.trips.length===0){el.innerHTML=emptyState("통계를 보여줄 데이터가 없어요","여행을 기록하면 통계가 채워져요");return;}
  const codes=visitedCodes();
  const totalDays=state.trips.reduce((s,t)=>s+dayCount(t.start,t.end),0);
  const totalFlights=state.trips.reduce((s,t)=>s+((t.flights||[]).length),0);
  const ratings=state.trips.filter(t=>t.rating).map(t=>t.rating);
  const avgRating=ratings.length?(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1):"-";

  el.innerHTML=`
  <div class="hero-stat">
    <div><div class="big">${codes.length}</div><div class="lbl">VISITED COUNTRIES · 방문국가</div></div>
    <div class="stamp">${codes.length}<br>국</div>
  </div>
  <div class="stat-grid">
    <div class="stat-box"><div class="val">${state.trips.length}</div><div class="lbl">총 여행 횟수</div></div>
    <div class="stat-box"><div class="val">${totalDays}</div><div class="lbl">총 여행일수</div></div>
    <div class="stat-box"><div class="val">${totalFlights}</div><div class="lbl">총 항공권 수</div></div>
    <div class="stat-box"><div class="val">${avgRating}</div><div class="lbl">평균 만족도</div></div>
  </div>
  <div class="chart-card"><h3>대륙별 방문 비율</h3><canvas id="continentChart"></canvas></div>
  <div class="chart-card"><h3>가장 많이 이용한 항공사</h3><canvas id="airlineChart"></canvas></div>
  `;
  drawContinentChart(codes);
  drawAirlineChart();
}
function dayCount(s,e){
  if(!s)return 1;
  const start=new Date(s),end=e?new Date(e):start;
  return Math.max(1,Math.round((end-start)/86400000)+1);
}
function drawContinentChart(codes){
  const counts={};
  CONTINENT_ORDER.forEach(c=>counts[c]=0);
  codes.forEach(code=>{const ci=countryInfo(code);if(ci)counts[ci.cont]=(counts[ci.cont]||0)+1;});
  const labels=Object.keys(counts).filter(k=>counts[k]>0);
  const data=labels.map(l=>counts[l]);
  if(charts.continent)charts.continent.destroy();
  charts.continent=new Chart(document.getElementById("continentChart"),{
    type:"doughnut",
    data:{labels,datasets:[{data,backgroundColor:["#B5483D","#C9A227","#1B2A4A","#5B6B85","#7E1248","#3A8F8A"],borderWidth:0}]},
    options:{plugins:{legend:{position:"bottom",labels:{font:{size:11},color:"#5B6B85"}}}}
  });
}
function drawAirlineChart(){
  const counts={};
  state.trips.forEach(t=>(t.flights||[]).forEach(f=>{const n=f.airline||"기타";counts[n]=(counts[n]||0)+1;}));
  const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  if(charts.airline)charts.airline.destroy();
  charts.airline=new Chart(document.getElementById("airlineChart"),{
    type:"bar",
    data:{labels:entries.map(e=>e[0]),datasets:[{data:entries.map(e=>e[1]),backgroundColor:"#B5483D",borderRadius:6}]},
    options:{indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{ticks:{precision:0,color:"#93A0B5"}},y:{ticks:{color:"#5B6B85",font:{size:11.5}}}}}
  });
}

      const hay=[f.airline,f.flightNo,f.from,f.to,t.city,ci?ci.ko:""].join(" ").toLowerCase();

/* ---- segmented date & time inputs ---- */
function onlyDigits(v){return v.replace(/[^0-9]/g,"");}
function wireDateInput(container){
  if(!container)return;
  const y=container.querySelector(".di-y"),m=container.querySelector(".di-m"),d=container.querySelector(".di-d");
  y.addEventListener("input",()=>{y.value=onlyDigits(y.value).slice(0,4);if(y.value.length===4)m.focus();});
  m.addEventListener("input",()=>{m.value=onlyDigits(m.value).slice(0,2);if(m.value.length===2)d.focus();});
  d.addEventListener("input",()=>{d.value=onlyDigits(d.value).slice(0,2);});
  [m,d].forEach(inp=>inp.addEventListener("blur",()=>clampDateInputs(m,d)));
}
function clampDateInputs(m,d){
  if(m.value){let mv=parseInt(m.value,10);if(mv<1)mv=1;if(mv>12)mv=12;m.value=String(mv).padStart(2,"0");}
  if(d.value){let dv=parseInt(d.value,10);if(dv<1)dv=1;if(dv>31)dv=31;d.value=String(dv).padStart(2,"0");}
}
function getDateValue(container){
  if(!container)return "";
  const y=container.querySelector(".di-y").value,m=container.querySelector(".di-m").value,d=container.querySelector(".di-d").value;
  if(!y||!m||!d)return "";
  return `${y.padStart(4,"0")}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;
}
function getDateValueLenient(container){
  if(!container)return "";
  const y=container.querySelector(".di-y").value;
  if(!y||y.length<4)return "";
  const m=container.querySelector(".di-m").value;
  const d=container.querySelector(".di-d").value;
  if(m&&d)return `${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;
  if(m)return `${y}-${m.padStart(2,"0")}`;
  return `${y}`;
}
function setDateValue(container,value){
  if(!container||!value)return;
  const parts=String(value).split("-");
  container.querySelector(".di-y").value=parts[0]||"";
  container.querySelector(".di-m").value=parts[1]||"";
  container.querySelector(".di-d").value=parts[2]||"";
}
function wireTimeInput(container){
  if(!container)return;
  const h=container.querySelector(".ti-h"),m=container.querySelector(".ti-m");
  h.addEventListener("input",()=>{h.value=onlyDigits(h.value).slice(0,2);if(h.value.length===2)m.focus();});
  m.addEventListener("input",()=>{m.value=onlyDigits(m.value).slice(0,2);});
  [h,m].forEach(inp=>inp.addEventListener("blur",()=>clampTimeInputs(h,m)));
}
function clampTimeInputs(h,m){
  if(h.value){let hv=parseInt(h.value,10);if(hv>23)hv=23;h.value=String(hv).padStart(2,"0");}
  if(m.value){let mv=parseInt(m.value,10);if(mv>59)mv=59;m.value=String(mv).padStart(2,"0");}
}
function getTimeValue(container){
  if(!container)return "";
  const h=container.querySelector(".ti-h").value,m=container.querySelector(".ti-m").value;
  if(!h||!m)return "";
  return `${h.padStart(2,"0")}:${m.padStart(2,"0")}`;
}
function setTimeValue(container,value){
  if(!container||!value)return;
  const parts=String(value).split(":");
  if(parts.length<2)return;
  container.querySelector(".ti-h").value=parts[0];
  container.querySelector(".ti-m").value=parts[1];
}

  (t.flights||[]).forEach(f=>addFlightBlock(f));

};
window.deleteTrip=function(id){

  state.trips=state.trips.filter(t=>t.id!==id);

};

tripForm.addEventListener("submit",e=>{

const SYNC_KEY="travelLogSyncConfig_v1";
function loadSyncConfig(){
  try{const raw=localStorage.getItem(SYNC_KEY);return raw?JSON.parse(raw):null;}catch(e){return null;}
}
function saveSyncConfig(cfg){localStorage.setItem(SYNC_KEY,JSON.stringify(cfg));}
function clearSyncConfig(){localStorage.removeItem(SYNC_KEY);}
let syncConfig=loadSyncConfig();

function openSyncModal(){renderSyncModal();document.getElementById("syncOverlay").classList.add("open");}
function closeSyncModal(){document.getElementById("syncOverlay").classList.remove("open");}
document.getElementById("syncBtn").addEventListener("click",openSyncModal);
document.getElementById("syncCloseBtn").addEventListener("click",closeSyncModal);

function fmtSyncTime(iso){
  if(!iso)return "-";
  const d=new Date(iso);
  if(isNaN(d))return "-";
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function renderSyncModal(){
  const body=document.getElementById("syncModalBody");
  if(syncConfig && syncConfig.binId){
    body.innerHTML=`
      <div class="sync-status"><span class="sync-dot on"></span>연결됨 · 마지막 동기화 ${fmtSyncTime(syncConfig.lastSync)}</div>
      <p class="sync-help">이 Bin ID를 다른 기기에서도 똑같이 입력하면 같은 여행 기록을 볼 수 있어요.</p>
      <div class="field"><label>Bin ID</label><input id="syncBinIdShow" type="text" value="${escapeAttr(syncConfig.binId)}" readonly></div>
      <button type="button" class="btn-primary" id="syncNowBtn">지금 동기화</button>
      <button type="button" class="btn-ghost" id="syncDisconnectBtn">연결 해제 (이 기기에만 저장)</button>
    `;
    document.getElementById("syncNowBtn").addEventListener("click",manualSync);
    document.getElementById("syncDisconnectBtn").addEventListener("click",()=>{
      if(confirm("연결을 해제할까요? 데이터는 이 기기에 그대로 남아있어요.")){
        clearSyncConfig();syncConfig=null;renderSyncModal();
      }
    });
  }else{
    body.innerHTML=`
      <div class="sync-status"><span class="sync-dot off"></span>이 기기에만 저장되고 있어요</div>
      <p class="sync-help">JSONBin.io API 키를 입력하면 여러 기기에서 같은 데이터를 볼 수 있어요. <a href="https://jsonbin.io" target="_blank" rel="noopener">jsonbin.io</a>에서 무료로 키를 발급받을 수 있어요. 기존 Bin이 있다면 Bin ID도 입력해주세요. 없다면 비워두면 자동으로 새로 만들어요.</p>
      <div class="field"><label>API Key (X-Master-Key)</label><input id="syncApiKey" type="text" placeholder="$2a$10$..."></div>
      <div class="field"><label>Bin ID (선택)</label><input id="syncBinId" type="text" placeholder="비워두면 새로 생성"></div>
      <button type="button" class="btn-primary" id="syncConnectBtn">연결하기</button>
    `;
    document.getElementById("syncConnectBtn").addEventListener("click",connectSync);
  }
}

async function jsonbinCreate(apiKey,payload){
  const res=await fetch("https://api.jsonbin.io/v3/b",{
    method:"POST",
    headers:{"Content-Type":"application/json","X-Master-Key":apiKey,"X-Bin-Name":"travel-log-data"},
    body:JSON.stringify(payload),
  });
  if(!res.ok)throw new Error("create failed");
  const data=await res.json();
  return data.metadata.id;
}
async function jsonbinFetch(apiKey,binId){
  const res=await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`,{headers:{"X-Master-Key":apiKey}});
  if(!res.ok)throw new Error("fetch failed");
  const data=await res.json();
  return data.record;
}
async function jsonbinPush(apiKey,binId,payload){
  const res=await fetch(`https://api.jsonbin.io/v3/b/${binId}`,{
    method:"PUT",
    headers:{"Content-Type":"application/json","X-Master-Key":apiKey},
    body:JSON.stringify(payload),
  });
  if(!res.ok)throw new Error("push failed");
  return res.json();
}

async function connectSync(){
  const apiKey=document.getElementById("syncApiKey").value.trim();
  let binId=document.getElementById("syncBinId").value.trim();
  if(!apiKey){alert("API 키를 입력해주세요.");return;}
  const btn=document.getElementById("syncConnectBtn");
  const origLabel=btn.textContent;
  btn.textContent="연결 중...";btn.disabled=true;
  try{
    if(binId){
      const remote=await jsonbinFetch(apiKey,binId);
      if(remote && Array.isArray(remote.trips))state=remote;
    }else{
      binId=await jsonbinCreate(apiKey,state);
    }
    syncConfig={apiKey,binId,lastSync:new Date().toISOString()};
    saveSyncConfig(syncConfig);
    await jsonbinPush(apiKey,binId,state);
    saveData();
    refreshAll();renderTimeline();renderStats();renderFlights();
    renderSyncModal();
  }catch(err){
    alert("연결에 실패했어요. API 키와 Bin ID를 다시 확인해주세요.");
    btn.textContent=origLabel;btn.disabled=false;
  }
}

async function manualSync(){
  if(!syncConfig)return;
  const btn=document.getElementById("syncNowBtn");
  const origLabel=btn.textContent;
  btn.textContent="동기화 중...";btn.disabled=true;
  try{
    const remote=await jsonbinFetch(syncConfig.apiKey,syncConfig.binId);
    if(remote && Array.isArray(remote.trips))state=remote;
    await jsonbinPush(syncConfig.apiKey,syncConfig.binId,state);
    syncConfig.lastSync=new Date().toISOString();
    saveSyncConfig(syncConfig);
    saveData();
    refreshAll();renderTimeline();renderStats();renderFlights();
    renderSyncModal();
  }catch(err){
    alert("동기화에 실패했어요. 네트워크 상태를 확인해주세요.");
  }finally{
    btn.disabled=false;btn.textContent=origLabel;
  }
}

function autoPushSync(){
  if(!syncConfig)return;
  jsonbinPush(syncConfig.apiKey,syncConfig.binId,state).then(()=>{
    syncConfig.lastSync=new Date().toISOString();
    saveSyncConfig(syncConfig);
  }).catch(()=>{ /* offline or failed — local copy is already saved, will retry on next change */ });
}

/* ====================================================================
   HELPERS
==================================================================== */
function fmtRange(s,e){
  if(!s)return "";
  const fs=fmtDateShort(s);
  if(!e||e===s)return fs;
  return `${fs} → ${fmtDateShort(e)}`;
}
function fmtDateShort(d){
  if(!d)return "";
  const m=String(d).match(/^(\d{4})(?:-(\d{2}))?(?:-(\d{2}))?$/);
  if(m){
    if(m[3])return `${m[1]}.${m[2]}.${m[3]}`;
    if(m[2])return `${m[1]}.${m[2]}`;
    return m[1];
  }
  const dt=new Date(d);
  if(isNaN(dt))return d;
  return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,"0")}.${String(dt.getDate()).padStart(2,"0")}`;
}
const BP_MONTHS=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
function fmtBoardingDate(d){
  if(!d)return "";
  const m=String(d).match(/^(\d{4})(?:-(\d{2}))?(?:-(\d{2}))?$/);
  if(m){
    const yy=m[1].slice(-2);
    if(m[3])return `${m[3]}${BP_MONTHS[parseInt(m[2],10)-1]}${yy}`;
    if(m[2])return `${BP_MONTHS[parseInt(m[2],10)-1]}${yy}`;
    return m[1];
  }
  const dt=new Date(d);
  if(isNaN(dt))return d;
  return `${String(dt.getDate()).padStart(2,"0")}${BP_MONTHS[dt.getMonth()]}${String(dt.getFullYear()).slice(-2)}`;
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s);}

/* ====================================================================
   INIT
==================================================================== */
initMap();
updateCounters();
renderMarkers();
if(syncConfig){
  jsonbinFetch(syncConfig.apiKey,syncConfig.binId).then(remote=>{
    if(remote && Array.isArray(remote.trips)){
      state=remote;
      saveData();
      updateCounters();
      refreshMapStyle();
      renderMarkers();
      renderTimeline();renderStats();renderFlights();
    }
  }).catch(()=>{ /* offline — keep showing the local cached copy */ });
}
window.addEventListener("load",()=>{setTimeout(()=>map&&map.invalidateSize(),200);});
</script>
